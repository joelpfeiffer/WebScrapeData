name: Scrape ANWB brandstofprijzen

on:
  schedule:
    - cron: "37 16 * * *"   # Dagelijks om 16:37 UTC
  workflow_dispatch:        # Handmatig starten mogelijk

permissions:
  contents: write           # Nodig om commits te kunnen pushen

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Run ANWB scraper
        run: python script/scrape_anwb.py

      - name: Commit & push CSV output
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/*.csv
          git commit -m "Automatische brandstofupdate" || echo "Geen wijzigingen"
          git push
