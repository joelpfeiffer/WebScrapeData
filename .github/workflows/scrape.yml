name: Scrape ANWB fuel prices daily

on:
  schedule:
    - cron: "0 0 * * *"    # draait elke dag om 00:00 UTC
  workflow_dispatch:        # handmatig starten mogelijk

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python script/scrape_anwb.py

      - name: Commit & Push results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/brandstofprijzen.csv
          git commit -m "Daily ANWB fuel price update" || echo "No changes to commit"
          git push
