name: ANWB Brandstof Scraper

on:
  schedule:
    - cron: "5 0 * * *"   # Elke dag om 00:05
  workflow_dispatch:       # Handmatig starten mogelijk

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Chromium
      run: |
        python -m playwright install chromium

    - name: Run ANWB scraper
      run: python script/scrape_anwb.py

    - name: Configure Git user
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

    - name: Add CSV changes
      run: |
        git add docs/data/*.csv || echo "No CSV files found"

    - name: Commit changes
      run: |
        git commit -m "Automatische brandstof update $(date +"%Y-%m-%d")" || echo "No changes to commit"

    - name: Push changes
      run: git push
