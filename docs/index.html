<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
</head>

<body>

<div class="nav">
  <a href="index.html" class="active">Dashboard</a>
  <a href="vergelijking.html">Vergelijking</a>
</div>

<h1>Brandstofprijzen Dashboard</h1>

<div class="card">
  <select id="country"></select>
  <button onclick="loadData()">Laden</button>
  <button onclick="downloadCSV()">Download CSV</button>
</div>

<div class="card">
  <strong>Periode:</strong>

  <button class="range-btn active" onclick="setRange(this,null)">Alles</button>
  <button class="range-btn" onclick="setRange(this,7)">1 week</button>
  <button class="range-btn" onclick="setRange(this,14)">2 weken</button>
  <button class="range-btn" onclick="setRange(this,30)">1 maand</button>
  <button class="range-btn" onclick="setRange(this,60)">2 maanden</button>
  <button class="range-btn" onclick="setRange(this,180)">6 maanden</button>
  <button class="range-btn" onclick="setRange(this,365)">1 jaar</button>
  <button class="range-btn" onclick="setRange(this,730)">2 jaar</button>
</div>

<!-- MAIN GRAPH -->
<div class="card" id="chartCard">
  <button onclick="toggleFullscreen('chartCard')">Fullscreen</button>

  <div class="chart-container">
    <canvas id="chart"></canvas>
  </div>
</div>

<!-- COMPARE -->
<div class="card" id="compareCard">
  <h2>Vergelijk landen</h2>

  <div class="compare-controls">

    <select id="multiCountry" multiple size="6"></select>

    <div class="fuel-select">
      <strong>Brandstof:</strong><br>
      <select id="compareFuel"></select>
    </div>

    <div class="compare-buttons">
      <button onclick="compareCountries()">Vergelijk</button>
      <button onclick="toggleFullscreen('compareCard')">Fullscreen</button>
    </div>

  </div>

  <div class="chart-container">
    <canvas id="compareChart"></canvas>
  </div>
</div>

<script>
let allData = {};
let chart;
let compareChart;
let currentRange = null;

/* ================= CROSSHAIR ================= */
const crosshairPlugin = {
  id: 'crosshair',
  afterDraw: (chart) => {
    if (chart.tooltip?._active?.length) {
      const ctx = chart.ctx;
      const x = chart.tooltip._active[0].element.x;
      const topY = chart.scales.y.top;
      const bottomY = chart.scales.y.bottom;

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x, topY);
      ctx.lineTo(x, bottomY);
      ctx.lineWidth = 1;
      ctx.strokeStyle = '#94a3b8';
      ctx.stroke();
      ctx.restore();
    }
  }
};

/* ================= INIT ================= */
fetch('data/all.json?v=' + Date.now())
.then(r=>r.json())
.then(data=>{
  allData = data;

  const countrySel = document.getElementById('country');
  const multiSel = document.getElementById('multiCountry');

  Object.keys(data).forEach(c=>{
    const name = c.charAt(0).toUpperCase()+c.slice(1);

    countrySel.innerHTML += `<option value="${c}">${name}</option>`;
    multiSel.innerHTML += `<option value="${c}">${name}</option>`;
  });

  const fuels = data[Object.keys(data)[0]].header.slice(1);
  const fuelSel = document.getElementById('compareFuel');

  fuels.forEach((f,i)=>{
    fuelSel.innerHTML += `<option value="${i+1}">${f}</option>`;
  });

  loadData();
});

/* ================= RANGE ================= */
function setRange(btn,days){
  currentRange = days;

  document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  loadData();
}

function getColor(i){
  const c = ["#3b82f6","#22c55e","#f59e0b","#ef4444","#a855f7","#06b6d4"];
  return c[i % c.length];
}

/* ================= MAIN GRAPH ================= */
function loadData(){
  const c = document.getElementById('country').value;
  let rows = allData[c].data;

  if(currentRange) rows = rows.slice(-currentRange);

  const labels = rows.map(r=>r[0]);
  const fuels = allData[c].header.slice(1);

  const datasets = fuels.map((f,i)=>({
    label:f,
    data:rows.map(r=>parseFloat(r[i+1])),
    borderColor:getColor(i),
    tension:0.2
  }));

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById('chart'), {
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{
        mode:'index',
        intersect:false
      },
      plugins:{
        tooltip:{
          callbacks:{
            label: ctx => `${ctx.dataset.label}: € ${ctx.raw.toFixed(3)}`
          }
        },
        zoom:{
          pan:{enabled:true,mode:'x'},
          zoom:{wheel:{enabled:true},mode:'x'}
        }
      }
    },
    plugins:[crosshairPlugin]
  });

  chart.canvas.ondblclick = () => chart.resetZoom();
}

/* ================= COMPARE ================= */
function compareCountries(){
  const sel = Array.from(document.getElementById('multiCountry').selectedOptions)
    .map(o=>o.value);

  if(sel.length === 0){
    alert("Selecteer minimaal één land");
    return;
  }

  const fuel = parseInt(document.getElementById('compareFuel').value);

  const datasets = sel.map((c,i)=>{
    let rows = allData[c].data;
    if(currentRange) rows = rows.slice(-currentRange);

    return {
      label:c,
      data:rows.map(r=>parseFloat(r[fuel])),
      borderColor:getColor(i)
    };
  });

  const labels = allData[sel[0]].data.map(r=>r[0]);

  if(compareChart) compareChart.destroy();

  compareChart = new Chart(document.getElementById('compareChart'), {
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{
        mode:'index',
        intersect:false
      },
      plugins:{
        zoom:{
          pan:{enabled:true,mode:'x'},
          zoom:{wheel:{enabled:true},mode:'x'}
        }
      }
    },
    plugins:[crosshairPlugin]
  });

  compareChart.canvas.ondblclick = () => compareChart.resetZoom();
}

/* ================= FULLSCREEN ================= */
function toggleFullscreen(id){
  const el = document.getElementById(id);
  el.classList.toggle("fullscreen");

  setTimeout(()=>{
    if(chart) chart.resize();
    if(compareChart) compareChart.resize();
  },300);
}

/* ================= DOWNLOAD ================= */
function downloadCSV(){
  const c = document.getElementById('country').value;
  const d = allData[c];

  let csv = "Datum," + d.header.slice(1).join(",") + "\\n";

  d.data.forEach(row=>{
    csv += row[0] + "," + row.slice(1).join(",") + "\\n";
  });

  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv]));
  a.download=c+".csv";
  a.click();
}
</script>

</body>
</html>
