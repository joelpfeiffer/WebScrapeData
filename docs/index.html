<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="nav">
  <a href="index.html">Dashboard</a>
  <a href="vergelijking.html">Vergelijking</a>
</div>

<h1>Brandstofprijzen Dashboard</h1>

<div class="card">
  <select id="country"></select>
  <button onclick="loadData()">Laden</button>
  <button onclick="downloadCSV()">Download CSV</button>
</div>

<!-- RANGE -->
<div class="card">
  <strong>Periode:</strong>
  <button class="range-btn active" onclick="setRange(this, null)">Alles</button>
  <button class="range-btn" onclick="setRange(this, 7)">1 week</button>
  <button class="range-btn" onclick="setRange(this, 14)">2 weken</button>
  <button class="range-btn" onclick="setRange(this, 30)">1 maand</button>
  <button class="range-btn" onclick="setRange(this, 60)">2 maanden</button>
  <button class="range-btn" onclick="setRange(this, 180)">6 maanden</button>
  <button class="range-btn" onclick="setRange(this, 365)">1 jaar</button>
  <button class="range-btn" onclick="setRange(this, 730)">2 jaar</button>
</div>

<div class="card">
  <p id="trend"></p>
  <canvas id="chart"></canvas>
</div>

<script>
let allData = {};
let chart;
let currentRange = null;

fetch('data/all.json')
.then(r => r.json())
.then(data => {
  allData = data;

  const sel = document.getElementById('country');

  Object.keys(data).forEach(c => {
    let o = document.createElement('option');
    o.value = c;
    o.textContent = c.charAt(0).toUpperCase() + c.slice(1);
    sel.appendChild(o);
  });

  loadData();
});

function setRange(btn, days){
  currentRange = days;

  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  loadData();
}

function getColor(i){
  const colors = ["#3b82f6","#22c55e","#f59e0b","#ef4444","#a855f7"];
  return colors[i % colors.length];
}

function loadData(){
  const country = document.getElementById('country').value;
  const d = allData[country];

  let rows = d.data;
  if(currentRange) rows = rows.slice(-currentRange);

  const dates = rows.map(r => r[0]);
  const fuels = d.header.slice(1);

  const datasets = fuels.map((fuel, i) => ({
    label: fuel,
    data: rows.map(r => parseFloat(r[i+1])),
    borderColor: getColor(i),
    tension: 0.2
  }));

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: { labels: dates, datasets: datasets }
  });
}

function downloadCSV(){
  const country = document.getElementById('country').value;
  const d = allData[country];

  let csv = d.header.join(",") + "\\n";
  d.data.forEach(r => csv += r.join(",") + "\\n");

  const blob = new Blob([csv]);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = country + ".csv";
  a.click();
}
</script>

</body>
</html>
