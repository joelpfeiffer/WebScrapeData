<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
<meta charset="UTF-8" />
<title>Brandstofprijzen Trend</title>

<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: var(--bg);
        color: var(--text);
    }

    :root {
        --bg: #ffffff;
        --text: #000000;
        --border: #cccccc;
        --table-bg: #ffffff;
    }

    [data-theme="dark"] {
        --bg: #121212;
        --text: #f0f0f0;
        --border: #444444;
        --table-bg: #1d1d1d;
    }

    table {
        border-collapse: collapse;
        width: 100%;
        background: var(--table-bg);
    }

    th, td {
        border: 1px solid var(--border);
        padding: 8px;
        text-align: left;
    }

    th {
        background: var(--border);
        color: var(--text);
    }

    select {
        padding: 6px;
        font-size: 14px;
    }

    button {
        padding: 6px 12px;
        margin: 3px;
        border: 1px solid var(--border);
        background: var(--table-bg);
        cursor: pointer;
    }

    button.active {
        background: #0078ff;
        color: white;
    }
</style>
</head>

<body>

<h1>Brandstofprijzen Trend</h1>

<button id="themeToggle">🌙 Dark Mode</button>

<br /><br />

<label for="landSelect">Selecteer landen (max 4):</label><br />
<select id="landSelect" multiple size="6" style="min-width: 250px; margin-top:10px;"></select>

<br /><br />

<div>
    <button data-range="7">1 week</button>
    <button data-range="14">2 weken</button>
    <button data-range="30">1 maand</button>
    <button data-range="60">2 maanden</button>
    <button data-range="90">3 maanden</button>
    <button data-range="180">6 maanden</button>
    <button data-range="365">1 jaar</button>
    <button data-range="730">2 jaar</button>
    <button data-range="all" class="active">Alles</button>
</div>

<br />

<div id="comparisonTable"></div>

<script src="script.js"></script>
</body>
</html>
