<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Brandstofprijzen Trend</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #fafafa; }

    .controls { margin: 20px 0; }
    select { padding: 8px; font-size: 16px; }

    button {
        padding: 6px 12px;
        margin: 3px;
        border: 1px solid #555;
        background: white;
        cursor: pointer;
    }
    button.active {
        background: #0078ff;
        color: white;
    }

    canvas {
        margin-top: 30px;
        background: white;
        padding: 10px;
        border: 1px solid #ccc;
    }

    table { margin-top: 20px; border-collapse: collapse; width: 600px; }
    th, td { border: 1px solid #ccc; padding: 6px; text-align: left; }
</style>
</head>

<body>

<h1>Brandstofprijzen Trend</h1>

<div class="controls">
    <label for="landSelect">Selecteer land:</label>
    <select id="landSelect">
        <option>CSV-bestanden laden...</option>
    </select>
</div>

<div class="controls">
    <button data-range="7">1 week</button>
    <button data-range="14">2 weken</button>
    <button data-range="30">1 maand</button>
    <button data-range="60">2 maanden</button>
    <button data-range="90">3 maanden</button>
    <button data-range="180">6 maanden</button>
    <button data-range="365">1 jaar</button>
    <button data-range="730">2 jaar</button>
    <button data-range="all" class="active">Alles</button>
</div>

<canvas id="trendChart" width="800" height="350"></canvas>

<div id="output"></div>

<script src="script.js"></script>

</body>
</html>
