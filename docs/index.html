<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Brandstofprijzen Trend</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    select { padding: 8px; font-size: 16px; margin-bottom: 20px; }

    button {
        padding: 6px 12px;
        margin: 3px;
        border: 1px solid #555;
        background: white;
        cursor: pointer;
        border-radius: 4px;
    }

    button.active {
        background: #0078ff;
        color: white;
    }

    canvas {
        margin-top: 20px;
        background: white;
    }
</style>
</head>

<body>

<h1>Brandstofprijzen Trend</h1>

<label for="landSelect">Selecteer land:</label>
<select id="landSelect">
    <option>Data laden...</option>
</select>

<div class="controls">
    <button data-range="7">1 week</button>
    <button data-range="14">2 weken</button>
    <button data-range="30">1 maand</button>
    <button data-range="60">2 maanden</button>
    <button data-range="90">3 maanden</button>
    <button data-range="180">6 maanden</button>
    <button data-range="365">1 jaar</button>
    <button data-range="730">2 jaar</button>
    <button data-range="all" class="active">Alles</button>
</div>

<canvas id="trendChart" width="900" height="400"></canvas>

<script src="script.js"></script>

</body>
</html>
