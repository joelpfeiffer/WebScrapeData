<script>
let allData = {};
let chart;
let compareChart;
let currentRange = null;

/* ================= UTIL ================= */

// Datum parser (werkt met 2026-03-21 én 17-03-2026)
function parseDate(d){
  if(d.includes("-") && d.split("-")[0].length === 4){
    return new Date(d); // ISO
  } else {
    const [day,month,year] = d.split("-");
    return new Date(`${year}-${month}-${day}`);
  }
}

// Data opschonen
function cleanData(rows){

  // verwijder dubbele datums
  const unique = rows.filter((row, index, self) =>
    index === self.findIndex(r => r[0] === row[0])
  );

  // sorteer op datum
  unique.sort((a,b)=> parseDate(a[0]) - parseDate(b[0]));

  return unique;
}

function getColor(i){
  const c = ["#3b82f6","#22c55e","#f59e0b","#ef4444","#a855f7","#06b6d4"];
  return c[i % c.length];
}

/* ================= CROSSHAIR ================= */
const crosshairPlugin = {
  id: 'crosshair',
  afterDraw: (chart) => {
    if (chart.tooltip?._active?.length) {
      const ctx = chart.ctx;
      const x = chart.tooltip._active[0].element.x;
      const topY = chart.scales.y.top;
      const bottomY = chart.scales.y.bottom;

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x, topY);
      ctx.lineTo(x, bottomY);
      ctx.lineWidth = 1;
      ctx.strokeStyle = '#94a3b8';
      ctx.stroke();
      ctx.restore();
    }
  }
};

/* ================= INIT ================= */
fetch('data/all.json?v=' + Date.now())
.then(r=>r.json())
.then(data=>{
  allData = data;

  const countrySel = document.getElementById('country');
  const multiSel = document.getElementById('multiCountry');

  Object.keys(data).forEach(c=>{
    const name = c.charAt(0).toUpperCase()+c.slice(1);

    countrySel.innerHTML += `<option value="${c}">${name}</option>`;
    multiSel.innerHTML += `<option value="${c}">${name}</option>`;
  });

  const fuels = data[Object.keys(data)[0]].header.slice(1);
  const fuelSel = document.getElementById('compareFuel');

  fuels.forEach((f,i)=>{
    fuelSel.innerHTML += `<option value="${i+1}">${f}</option>`;
  });

  loadData();
});

/* ================= RANGE ================= */
function setRange(btn,days){
  currentRange = days;

  document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  loadData();
}

/* ================= MAIN GRAPH ================= */
function loadData(){
  const c = document.getElementById('country').value;
  let rows = [...allData[c].data];

  rows = cleanData(rows);

  if(currentRange !== null){
    rows = rows.slice(-currentRange);
  }

  const labels = rows.map(r=>r[0]);
  const fuels = allData[c].header.slice(1);

  const datasets = fuels.map((f,i)=>({
    label:f,
    data:rows.map(r=>{
      const val = parseFloat(r[i+1]);
      return isNaN(val) ? null : val;
    }),
    borderColor:getColor(i),
    tension:0.2,
    spanGaps:true
  }));

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById('chart'), {
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{
        mode:'index',
        intersect:false
      },
      plugins:{
        tooltip:{
          callbacks:{
            label: ctx => ctx.raw !== null
              ? `${ctx.dataset.label}: € ${ctx.raw.toFixed(3)}`
              : `${ctx.dataset.label}: geen data`
          }
        },
        zoom:{
          pan:{enabled:true,mode:'x'},
          zoom:{wheel:{enabled:true},mode:'x'}
        }
      }
    },
    plugins:[crosshairPlugin]
  });

  // 🔥 FIX: altijd resetten
  chart.resetZoom();

  chart.canvas.ondblclick = () => chart.resetZoom();
}

/* ================= COMPARE ================= */
function compareCountries(){
  const sel = Array.from(document.getElementById('multiCountry').selectedOptions)
    .map(o=>o.value);

  if(sel.length === 0){
    alert("Selecteer minimaal één land");
    return;
  }

  const fuel = parseInt(document.getElementById('compareFuel').value);

  let baseRows = cleanData([...allData[sel[0]].data]);

  if(currentRange !== null){
    baseRows = baseRows.slice(-currentRange);
  }

  const labels = baseRows.map(r=>r[0]);

  const datasets = sel.map((c,i)=>{
    let rows = cleanData([...allData[c].data]);

    if(currentRange !== null){
      rows = rows.slice(-currentRange);
    }

    return {
      label:c,
      data:rows.map(r=>{
        const val = parseFloat(r[fuel]);
        return isNaN(val) ? null : val;
      }),
      borderColor:getColor(i),
      spanGaps:true
    };
  });

  if(compareChart) compareChart.destroy();

  compareChart = new Chart(document.getElementById('compareChart'), {
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{
        mode:'index',
        intersect:false
      },
      plugins:{
        zoom:{
          pan:{enabled:true,mode:'x'},
          zoom:{wheel:{enabled:true},mode:'x'}
        }
      }
    },
    plugins:[crosshairPlugin]
  });

  compareChart.resetZoom();

  compareChart.canvas.ondblclick = () => compareChart.resetZoom();
}

/* ================= FULLSCREEN ================= */
function toggleFullscreen(id){
  const el = document.getElementById(id);
  el.classList.toggle("fullscreen");

  setTimeout(()=>{
    if(chart) chart.resize();
    if(compareChart) compareChart.resize();
  },300);
}

/* ================= DOWNLOAD ================= */
function downloadCSV(){
  const c = document.getElementById('country').value;
  const d = allData[c];

  let csv = "Datum," + d.header.slice(1).join(",") + "\n";

  d.data.forEach(row=>{
    csv += row[0] + "," + row.slice(1).join(",") + "\n";
  });

  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv]));
  a.download=c+".csv";
  a.click();
}
</script>
