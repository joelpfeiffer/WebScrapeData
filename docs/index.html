<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
<meta charset="UTF-8">
<title>Brandstofprijzen Trend</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: var(--bg);
        color: var(--text);
    }

    :root {
        --bg: #ffffff;
        --text: #000000;
        --button-bg: #ffffff;
        --button-border: #444;
        --button-active-bg: #0078ff;
        --button-active-text: #ffffff;
        --canvas-bg: #ffffff;
        --canvas-border: #ccc;
    }

    /* DARK MODE */
    [data-theme="dark"] {
        --bg: #121212;
        --text: #e5e5e5;
        --button-bg: #1e1e1e;
        --button-border: #888;
        --button-active-bg: #005bd1;
        --button-active-text: #ffffff;
        --canvas-bg: #1e1e1e;
        --canvas-border: #555;
    }

    select {
        padding: 8px;
        font-size: 16px;
        margin-left: 10px;
    }

    button {
        padding: 6px 12px;
        margin: 3px;
        border: 1px solid var(--button-border);
        background: var(--button-bg);
        color: var(--text);
        cursor: pointer;
        border-radius: 4px;
    }

    button.active {
        background: var(--button-active-bg);
        color: var(--button-active-text);
    }

    #trendChart {
        width: 700px !important;
        height: 350px !important;
        background: var(--canvas-bg);
        border: 1px solid var(--canvas-border);
        margin-top: 20px;
    }
</style>
</head>

<body>

    
<div style="text-align:right; margin-bottom:20px;">
    <button onclick="window.location.href='vergelijking.html'"
            style="padding:8px 14px; cursor:pointer;">
        Ga naar Vergelijkingspagina
    </button>
</div>


<h1>Brandstofprijzen Trend</h1>

<button id="themeToggle">🌙 Dark Mode</button>

<label for="landSelect">Selecteer land:</label>
<select id="landSelect">
    <option>Data laden…</option>
</select>

<div>
    <button data-range="7">1 week</button>
    <button data-range="14">2 weken</button>
    <button data-range="30">1 maand</button>
    <button data-range="60">2 maanden</button>
    <button data-range="90">3 maanden</button>
    <button data-range="180">6 maanden</button>
    <button data-range="365">1 jaar</button>
    <button data-range="730">2 jaar</button>
    <button data-range="all" class="active">Alles</button>
</div>

<canvas id="trendChart"></canvas>

<!-- 🟢 DIT WAS FOUT — DIT IS NU GOED -->
<script src="script.js"></script>

</body>
</html>
