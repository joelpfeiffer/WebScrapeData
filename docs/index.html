<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="nav">
  <a href="index.html">Dashboard</a>
  <a href="vergelijking.html">Vergelijking</a>
</div>

<h1>Brandstofprijzen Dashboard</h1>

<div class="card">
  <select id="country"></select>
  <button onclick="loadData()">Laden</button>
</div>

<div class="card">
  <h2 id="title"></h2>
  <p id="trend"></p>
  <canvas id="chart"></canvas>
</div>

<script>
let chart;

fetch('data/index.json')
  .then(r => r.json())
  .then(countries => {
    const sel = document.getElementById('country');
    countries.forEach(c => {
      let o = document.createElement('option');
      o.value = c;
      o.textContent = c;
      sel.appendChild(o);
    });
    loadData();
  });

function loadData(){
  const country = document.getElementById('country').value;

  fetch(`data/${country}.csv`)
    .then(r => r.text())
    .then(text => {
      const rows = text.trim().split('\n').slice(1);
      const data = rows.map(r => r.split(','));

      const dates = data.map(r => r[0]);
      const prices = data.map(r => parseFloat(r[1]));

      const last = prices.at(-1);
      const prev = prices.at(-2);

      const trendEl = document.getElementById('trend');

      if(prev){
        const diff = last - prev;
        if(diff > 0){
          trendEl.textContent = `Stijging: +${diff.toFixed(3)}`;
          trendEl.className = "trend-up";
        } else {
          trendEl.textContent = `Daling: ${diff.toFixed(3)}`;
          trendEl.className = "trend-down";
        }
      }

      document.getElementById('title').textContent = country;

      if(chart) chart.destroy();

      chart = new Chart(document.getElementById('chart'), {
        type: 'line',
        data: {
          labels: dates,
          datasets: [{
            label: 'Prijs',
            data: prices
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } }
        }
      });
    });
}
</script>

</body>
</html>
