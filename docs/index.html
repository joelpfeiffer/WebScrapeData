<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="nav">
<a href="index.html">Dashboard</a>
<a href="vergelijking.html">Vergelijking</a>
</div>

<h1>Dashboard</h1>

<div class="card">
<select id="country"></select>
<button onclick="loadData()">Laden</button>
<button onclick="downloadCSV()">Download CSV</button>
</div>

<div class="card">
<p id="trend"></p>
<canvas id="chart"></canvas>
</div>

<script>
let allData={}, chart;

fetch('data/all.json')
.then(r=>r.json())
.then(d=>{
  allData=d;
  const sel=document.getElementById('country');
  Object.keys(d).forEach(c=>{
    let o=document.createElement('option');
    o.value=c; o.textContent=c;
    sel.appendChild(o);
  });
  loadData();
});

function loadData(){
  const c=document.getElementById('country').value;
  const d=allData[c];

  const dates=d.data.map(r=>r[0]);
  const prices=d.data.map(r=>parseFloat(r[1]));

  const last=prices.at(-1), prev=prices.at(-2);
  const t=document.getElementById('trend');

  if(prev){
    const diff=last-prev;
    t.textContent=diff>0?`Stijging +${diff.toFixed(3)}`:`Daling ${diff.toFixed(3)}`;
    t.className=diff>0?"trend-up":"trend-down";
  }

  if(chart) chart.destroy();
  chart=new Chart(document.getElementById('chart'),{
    type:'line',
    data:{labels:dates,datasets:[{data:prices}]}
  });
}

function downloadCSV(){
  const c=document.getElementById('country').value;
  const d=allData[c];

  let csv=d.header.join(",")+"\n";
  d.data.forEach(r=>csv+=r.join(",")+"\n");

  const blob=new Blob([csv]);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=c+".csv";
  a.click();
}
</script>

</body>
</html>
