<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Vergelijking</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="nav">
  <a href="index.html">Dashboard</a>
  <a href="vergelijking.html">Vergelijking</a>
</div>

<h1>Vergelijk landen</h1>

<div class="card">
  <button onclick="load()">Laden</button>
  <button onclick="sort()">Sorteer op Euro95</button>

  <table>
    <thead id="thead"></thead>
    <tbody id="body"></tbody>
  </table>
</div>

<script>
let data = [];

function load(){
  document.getElementById('body').innerHTML = "Laden...";

  fetch('data/all.json')
  .then(r=>r.json())
  .then(d=>{

    const headers = d[Object.keys(d)[0]].header;

    document.getElementById('thead').innerHTML =
      "<tr><th>Land</th>" +
      headers.slice(1).map(h => `<th>${h}</th>`).join("") +
      "</tr>";

    data = [];

    for(const c in d){
      const last = d[c].data.at(-1);
      data.push({ land:capitalize(c), values:last.slice(1) });
    }

    render();
  });
}

function render(){
  const b = document.getElementById('body');
  b.innerHTML = "";

  data.forEach(d=>{
    const cells = d.values.map(v => {
      const num = parseFloat(v);
      return `<td>${!isNaN(num)?num.toFixed(3):"-"}</td>`;
    }).join("");

    b.innerHTML += `<tr><td>${d.land}</td>${cells}</tr>`;
  });
}

function sort(){
  data.sort((a,b)=>parseFloat(a.values[0]) - parseFloat(b.values[0]));
  render();
}

function capitalize(str){
  return str.charAt(0).toUpperCase() + str.slice(1);
}
</script>

</body>
</html>
